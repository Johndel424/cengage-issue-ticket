        <!-- HEADER -->
        <header>

            <div>
                <h1>Issue Ticketing System</h1>
                <p>Manage and track issues efficiently</p>
            </div>

<section class="column">
    <div class="details-page">
        <div class="details-card">

            <div class="top-bar">
                <h2>Ticket Details</h2>
                <a href="main.html" class="back-btn">← Back</a>
            </div>

            <div class="ticket-details-container">
                <div class="header-section">
                    <span id="detTicketId" class="ticket-id-badge">#LOADING...</span>
                    <h1 id="detTitle">Loading Ticket Title...</h1>
                </div>

                <hr class="divider">

                <div class="details-grid">
                    <div class="detail-group">
                        <label>Status:</label>
                        <span id="detStatus" class="status-value">-</span>
                    </div>
                    <div class="detail-group">
                        <label>Priority:</label>
                        <span id="detPriority" class="priority-value">-</span>
                    </div>
                    <div class="detail-group">
                        <label>Category:</label>
                        <span id="detCategory">-</span>
                    </div>
                    <div class="detail-group">
                        <label>Created At:</label>
                        <span id="detCreatedAt">-</span>
                    </div>
                    <div class="detail-group">
                        <label>Created By:</label>
                        <span id="detCreatedBy" data-uid="">-</span>
                    </div>
                    <div class="detail-group">
                        <label>Assigned To:</label>
                        <span id="detAssignedTo" data-uid="">-</span>
                    </div>
                </div>

                <div class="description-section">
                    <label>Description</label>
                    <p id="detDescription">Loading description...</p>
                </div>

                <div class="action-section">
                    <button id="btnPickTicket" class="btn-action btn-pick">🫳 Pick Ticket</button>
                    <!-- <button id="btnResolveTicket" class="btn-action btn-resolve">✅ Resolve Ticket</button> -->
                     <div id="creatorActions" style="display: none; gap: 12px;">
        <button id="btnDeleteTicket" class="btn-action btn-delete">🗑️ Delete</button>
        <button id="btnResolveTicket" class="btn-action btn-resolve">✅ Resolve Ticket</button>
    </div>
                </div>
            </div>

        </div>
    </div>
</section>
</body>
<script>

function openTicketModal(){
    document.getElementById(
        "ticketDetailsModal"
    ).style.display = "flex";
}

function closeTicketModal(){
    document.getElementById(
        "ticketDetailsModal"
    ).style.display = "none";
}

</script>
<style>
    /* Card Container */
.details-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 24px;
    max-width: 650px;
    margin: 20px auto;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.top-bar h2 {
    font-size: 1.2rem;
    color: #64748b;
    margin: 0;
}

.back-btn {
    text-decoration: none;
    color: #3b82f6;
    font-size: 0.9rem;
    font-weight: 600;
}

/* Header Section inside Card */
.header-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 15px;
}

.ticket-id-badge {
    align-self: flex-start;
    font-size: 0.75rem;
    font-weight: 700;
    background: #f1f5f9;
    color: #475569;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: monospace;
}

#detTitle {
    font-size: 1.4rem;
    color: #1e293b;
    margin: 0;
    font-weight: 700;
}

.divider {
    border: 0;
    border-top: 1px solid #e2e8f0;
    margin: 15px 0;
}

/* Details Grid Setup */
.details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
}

.detail-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.detail-group label {
    font-size: 0.75rem;
    color: #94a3b8;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.detail-group span {
    font-size: 0.95rem;
    color: #334155;
    font-weight: 500;
}

/* Description container */
.description-section {
    background: #f8fafc;
    border: 1px solid #f1f5f9;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 25px;
}

.description-section label {
    font-size: 0.75rem;
    color: #94a3b8;
    text-transform: uppercase;
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
}

#detDescription {
    margin: 0;
    font-size: 0.95rem;
    color: #334155;
    line-height: 1.5;
    white-space: pre-wrap; /* Pinapanatili ang mga spaces at linebreaks */
}

/* 🔥 ACTIONS / BUTTONS SECTION STYLE */
.action-section {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    border-top: 1px solid #e2e8f0;
    padding-top: 20px;
}

.btn-action {
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.btn-pick {
    background-color: #3b82f6; /* Blue */
    color: white;
}

.btn-pick:hover {
    background-color: #2563eb;
}

.btn-resolve {
    background-color: #10b981; /* Green */
    color: white;
}

.btn-resolve:hover {
    background-color: #059669;
}

/* Kapag naka-disabled na ang button */
.btn-action:disabled {
    background-color: #cbd5e1;
    color: #94a3b8;
    cursor: not-allowed;
}
</style>
<script type="module" src="main-details.js"></script>
</html>
