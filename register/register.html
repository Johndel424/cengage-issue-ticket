<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow - Create Account</title>
    <link rel="stylesheet" href="register.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="container">

    <div class="register-card">

        <div class="logo">
            <div class="logo-icon">🎫</div>
            <h1>Cengage</h1>
            <p>Create your account</p>
        </div>

        <form>

            <div class="form-row">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Juan Dela Cruz" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="juan@gmail.com" 
                           required 
                           pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
                           title="Gmail address only (@gmail.com)">
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" id="togglePasswordFirst" class="text-toggle-btn">SHOW</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        <button type="button" id="togglePassword" class="text-toggle-btn">SHOW</button>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="workRole">Work Role</label>
                <select id="workRole" required>
                    <option value="" disabled selected>Select your work role</option>
                    <option value="team-lead">Team Leader</option>
                    <option value="software-engineer">Software Engineer</option>
                    <option value="data-analyst">Data Analyst</option>
                    <option value="update-editor">Update Editor</option>
                </select>
            </div>

            <button type="submit" class="btn-register">
                Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="../index.html">Login</a>
        </div>

    </div>

</div>
<script type="module" src="register.js"></script>
</body>
</html>
